name: Release build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload'
        required: true

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Maven
        uses: stCarolas/setup-maven@v4.2
        with:
          maven-version: 3.8.2

      - name: Determine version
        id: versioning
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF##*/}"
          fi

          VERSION="${RAW_TAG#v}"  # Strip leading 'v'
          echo "Using tag: $RAW_TAG -> version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply version
        run: |
          mvn versions:set -DnewVersion=${{ steps.versioning.outputs.version }} -DgenerateBackupPoms=false

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Rename JAR
        run: |
          mkdir out
          mv ./plugin/target/BetterKeepInventory-*.jar ./out/BetterKeepInventory-${{ steps.versioning.outputs.version }}.jar

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./out/BetterKeepInventory-${{ steps.versioning.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (fallback/manual use)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: BetterKeepInventory-${{ steps.versioning.outputs.version }}
          path: ./out/BetterKeepInventory-${{ steps.versioning.outputs.version }}.jar

      - uses: Kira-NT/mc-publish@52307b03863581dec6b652b83e597aec02ebb075 # v3.3.1
        with:
          modrinth-id: j0QDn41h
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1113203
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          version: "${{ steps.versioning.outputs.version }}"
          version-type: release
          loaders: |
            spigot
            paper
            purpur
            folia
          game-versions: |
            1.21.x
            26.x
          files: ./out/BetterKeepInventory-${{ steps.versioning.outputs.version }}.jar
          changelog: "Release ${{ steps.versioning.outputs.version }}. See the [GitHub Releases](https://github.com/beepsterr/betterkeepinventory/releases/tag/v${{ steps.versioning.outputs.version }}) for details."
