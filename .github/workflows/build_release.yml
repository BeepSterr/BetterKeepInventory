name: Release build

# BetterKeepInventory's release orchestrator: derives the version from the tag, then calls the shared
# reusable workflows to build -> publish. Maven plugin. .github/workflows/build_release.yml.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v2.3.0)'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: Beeps-Workshop/.github/.github/workflows/build.yml@main
    with:
      build-system: maven
      version: ${{ needs.prepare.outputs.version }}
      artifact-name: BetterKeepInventory
      jar-glob: plugin/target/BetterKeepInventory-*.jar

  release:
    needs: [prepare, build]
    permissions:
      contents: write # release.yml attaches the built jar to the GitHub Release
    uses: Beeps-Workshop/.github/.github/workflows/release.yml@main
    with:
      version: ${{ needs.prepare.outputs.version }}
      artifact-name: BetterKeepInventory
      modrinth-id: j0QDn41h
      curseforge-id: '1113203'
      loaders: |
        spigot
        paper
        purpur
        folia
      game-versions: |
        1.21.x
        26.x
      version-type: release
    secrets: inherit
