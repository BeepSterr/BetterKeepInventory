name: Tests

# Runs the unit test suite (JUnit 5 + MockBukkit) on every push and PR.
# Fast feedback so the effect/condition matrix doesn't have to be re-verified by hand.
# .github/workflows/test.yml
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B --no-transfer-progress -pl plugin -am test
