name: Snapshot build

# Weekly snapshot: builds & publishes an alpha every Monday if there were commits that week.
# Delegates to the shared reusable snapshot workflow. .github/workflows/build_snapshot.yml.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1' # Mondays 10:00 UTC

jobs:
  snapshot:
    uses: Beeps-Workshop/.github/.github/workflows/snapshot.yml@main
    with:
      build-system: maven
      artifact-name: BetterKeepInventory
      jar-glob: plugin/target/BetterKeepInventory-*.jar
      modrinth-id: j0QDn41h
      curseforge-id: '1113203'
      loaders: |
        spigot
        paper
        purpur
        folia
      game-versions: |
        1.21.x
        26.x
      java-version: '21'
      force: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit
